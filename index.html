<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anjali Gupta - Portfolio</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            padding: 0;
            background-image: url('https://mir-s3-cdn-cf.behance.net/project_modules/max_1200/d76bc6137081907.6204cd8f35ea9.gif');
            background-size: cover;
            background-attachment: fixed;
            color: #00ff00;
            font-weight: bold;
            font-style: italic;
        }
        .small-circle {
            width: 500px; /* Adjust the size as needed */
            height: 500px; /* Adjust the size as needed */
            border-radius: 50%; /* Makes the image circular */
            object-fit: cover; /* Ensures the image covers the entire circle */
            border: 2px solid #ccc; /* Optional: adds a border */
        }
        .drawer-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background-color: rgba(0, 0, 0, 0.7);
            color: #00ffff;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
        .drawer {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            transition: left 0.3s ease;
            z-index: 999;
        }
        .drawer.open {
            left: 0;
        }
        .drawer ul {
            list-style-type: none;
            padding: 0;
        }
        .drawer a {
            color: #00ffff;
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
        }
        .page {
            display: none;
            padding: 20px;
        }
        .page.active {
            display: block;
        }
        .content {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            margin-top: 50px;
        }
        h1, h2 {
            color: #00ffff;
        }
        .welcome-heading {
            text-align: center;
            margin-bottom: 30px;
        }
        .avatar-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #00ffff;
            display: inline-block;
        }
        .section {
            margin-bottom: 30px;
        }
        nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        button {
            background-color: rgba(0, 0, 0, 0.7);
            color: #00ffff;
            border: none;
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            font-style: italic;
        }
    </style>
</head>
<body>
    <button class="drawer-btn" onclick="toggleDrawer()">☰</button>
    <div class="drawer" id="drawer">
        <ul>
            <li><a href="#" onclick="goToPage(1)">Home</a></li>
            <li><a href="#" onclick="goToPage(2)">Education & Skills</a></li>
            <li><a href="#" onclick="goToPage(3)">Projects</a></li>
            <li><a href="#" onclick="goToPage(4)">Experience & Certifications</a></li>
        </ul>
    </div>

    <div id="page1" class="page active">
        <div class="content">
            <header>
                <h1 class="welcome-heading">Hello, I am Anjali Gupta</h1>
                <h2 class="welcome-heading">Welcome to My Portfolio</h2>
                <div class="avatar-container">
                    <img src="https://avatars.githubusercontent.com/u/92169945?v=4" class="small-circle">
                </div>
                <p>Kolkata, West Bengal</p>
            </header>
            <section id="contact">
                <h2>Contact</h2>
                <ul id="contact-list"></ul>
            </section>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="content">
            <section id="education">
                <h2>Education</h2>
            </section>
            <section id="skills">
                <h2>Skills</h2>
                <ul id="skills-list"></ul>
            </section>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="content">
            <section id="projects">
                <h2>Projects</h2>
            </section>
        </div>
    </div>

    <div id="page4" class="page">
        <div class="content">
            <section id="experience">
                <h2>Experience</h2>
            </section>
            <section id="certifications">
                <h2>Certifications</h2>
                <ul id="certifications-list"></ul>
            </section>
        </div>
    </div>

    <nav>
        <button onclick="changePage(-1)">Previous</button>
        <button onclick="changePage(1)">Next</button>
    </nav>

    <script>
        const portfolioData = {
            name: "Anjali Gupta",
            location: "Kolkata, West Bengal",
            contact: {
                phone: "+91-7439379144",
                email: "anjalig1810@gmail.com",
                linkedin: "linkedin.com/in/anjali-gupta",
                github: "github.com/anjalig18"
            },
            education: [
                {
                    institution: "Jis University",
                    degree: "Bachelor of Technology in Computer Science and Engineering",
                    gpa: "CGPA: 9.2",
                    period: "Sep 2021 – Present"
                },
                {
                    institution: "Arya Kanya Mahavidyalaya",
                    degree: "WBCHSE - 12th Boards (Science)",
                    gpa: "Percentage: 77.2%",
                    period: "Sept 2018 – May 2020"
                }
            ],
            skills: [
                "Data Structures & Algorithms", "C/C++", "Operating Systems", "Network Security",
                "Database Management System (DBMS)", "Basic knowledge in Artificial Intelligence",
                "OOPS Concept", "Web Development", "Basic Java"
            ],
            projects: [
                {
                    name: "E-Commerce",
                    date: "June 2024",
                    description: "A full-featured eCommerce platform built using the MERN stack (MongoDB, Express.js, React, Node.js). Used secure integration of user loyalty, brands, shopping cart functionality, and payments. RESTful APIs were used for efficient backend integration for state management at the front end."
                },
                {
                    name: "Weather app",
                    date: "March 2024",
                    description: "Created a dynamic weather application using HTML, CSS, and JavaScript, which provides real-time weather updates. A responsive design was used for a seamless user experience on the devices. Used a combination of APIs to retrieve accurate weather data and CSS for modern UI/UX development."
                },
                {
                    name: "Football Management System",
                    date: "April 2024",
                    description: "A football management system designed to streamline the operational and operational aspects of a football club. It has features for group management, organization, finance, communication, membership, ticketing and data analytics. This process improves productivity, organization and decision-making within the team."
                },
                {
                    name: "Real-Time stock price prediction and investment suggestion system using ML",
                    date: "Feb 2024",
                    description: "RealTimeStockAnalyzer is a real-time stock forecasting system developed through ML that uses streaming price data, calculates technical indicators, trains forecast patterns, and identifies profitable buy/sell signals."
                }
            ],
            experience: [
                {
                    company: "URGENT IT SOLUTION",
                    period: "June 2024 - PRESENT",
                    description: "Working as an intern at UIT Software Company. Built scalable web applications using JavaScript, React, Node.js, and SQL. Collaborated with cross-functional teams to improve program performance and user experience."
                }
            ],
            certifications: [
                "HTML, CSS, JavaScript, React - Bash School",
                "Internet Fundamental - Bash School",
                "Express.js - Bash School",
                "React - Bash School",
                "Mongoose",
                "Command Line in Git, GitHub",
                "Python for Data Analytics - Udemy",
                "SQL - Udemy",
                "PowerBI - Udemy",
                "Differential equation for engineers - Coursera",
                "Artificial intelligence & ML using python - Coursera"
            ]
        };

        function populateContent() {
            // Contact
            const contactList = document.getElementById('contact-list');
            for (const [key, value] of Object.entries(portfolioData.contact)) {
                const li = document.createElement('li');
                li.textContent = `${key}: ${value}`;
                contactList.appendChild(li);
            }

            // Education
            const educationSection = document.getElementById('education');
            portfolioData.education.forEach(edu => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <h3>${edu.institution}</h3>
                    <p>${edu.degree}</p>
                    <p>${edu.gpa}</p>
                    <p>${edu.period}</p>
                `;
                educationSection.appendChild(div);
            });

            // Skills
            const skillsList = document.getElementById('skills-list');
            portfolioData.skills.forEach(skill => {
                const li = document.createElement('li');
                li.textContent = skill;
                skillsList.appendChild(li);
            });

            // Projects
            const projectsSection = document.getElementById('projects');
            portfolioData.projects.forEach(project => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <h3>${project.name}</h3>
                    <p>${project.date}</p>
                    <p>${project.description}</p>
                `;
                projectsSection.appendChild(div);
            });

            // Experience
            const experienceSection = document.getElementById('experience');
            portfolioData.experience.forEach(exp => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <h3>${exp.company}</h3>
                    <p>${exp.period}</p>
                    <p>${exp.description}</p>
                `;
                experienceSection.appendChild(div);
            });

            // Certifications
            const certificationsList = document.getElementById('certifications-list');
            portfolioData.certifications.forEach(cert => {
                const li = document.createElement('li');
                li.textContent = cert;
                certificationsList.appendChild(li);
            });
        }

        let currentPage = 1;
        const totalPages = 4;

        function changePage(direction) {
            const currentPageElement = document.getElementById(`page${currentPage}`);
            currentPageElement.classList.remove('active');

            currentPage += direction;
            if (currentPage > totalPages) currentPage = 1;
            if (currentPage < 1) currentPage = totalPages;

            const newPageElement = document.getElementById(`page${currentPage}`);
            newPageElement.classList.add('active');
        }

        function toggleDrawer() {
            const drawer = document.getElementById('drawer');
            drawer.classList.toggle('open');
        }

        function goToPage(pageNumber) {
            const currentPageElement = document.getElementById(`page${currentPage}`);
            currentPageElement.classList.remove('active');

            currentPage = pageNumber;
            const newPageElement = document.getElementById(`page${currentPage}`);
            newPageElement.classList.add('active');

            toggleDrawer(); // Close the drawer after selection
        }

        document.addEventListener('DOMContentLoaded', () => {
            populateContent();
        });
    </script>
</body>
</html>
